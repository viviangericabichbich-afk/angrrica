<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photographer Portfolio</title>
    <style>
        :root {
            /* ブルーのカラーパレット */
            --primary-blue: #2A4B7C;
            --accent-blue: #5C88C4;
            --dark-blue: #0F1C2E;
            --light-bg: #F0F4F8;
            --text-main: #333333;
            --text-muted: #666666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            color: var(--text-main);
            background-color: var(--light-bg);
            line-height: 1.6;
        }

        /* ヘッダー */
        header {
            background-color: var(--dark-blue);
            color: #ffffff;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            font-weight: 300;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-blue);
        }

        /* ヒーローセクション */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(42, 75, 124, 0.7), rgba(15, 28, 46, 0.8)), url('https://via.placeholder.com/1920x1080/2A4B7C/ffffff?text=Main+Photography+Here') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero h2 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
        }

        /* ギャラリーセクション (CSS Grid) */
        .gallery-container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 5%;
        }

        .section-title {
            text-align: center;
            color: var(--primary-blue);
            font-size: 1.8rem;
            margin-bottom: 2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            background-color: var(--primary-blue);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .grid-item:hover img {
            transform: scale(1.05);
            opacity: 0.8;
        }

        /* フッター */
        footer {
            background-color: var(--dark-blue);
            color: white;
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>PHOTOGRAPHY</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="home">
        <div>
            <h2>Capturing the Blue</h2>
            <p>Silence, Light, and Moments.</p>
        </div>
    </section>

    <section class="gallery-container" id="gallery">
        <h3 class="section-title">Works</h3>
        <div class="grid">
            <!-- ダミー画像。実際の写真ファイルのパスに置き換えてください -->
            <div class="grid-item"><img src="https://via.placeholder.com/600x400/5C88C4/ffffff?text=Photo+1" alt="Work 1"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/600x400/2A4B7C/ffffff?text=Photo+2" alt="Work 2"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/600x400/0F1C2E/ffffff?text=Photo+3" alt="Work 3"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/600x400/5C88C4/ffffff?text=Photo+4" alt="Work 4"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/600x400/2A4B7C/ffffff?text=Photo+5" alt="Work 5"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/600x400/0F1C2E/ffffff?text=Photo+6" alt="Work 6"></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Photography. All Rights Reserved.</p>
    </footer>

</body>
</html>
