<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Photographer Portfolio</title>
    <style>
        :root {
            /* メインページと共通のカラーパレット */
            --primary-blue: #2A4B7C;
            --accent-blue: #5C88C4;
            --dark-blue: #0F1C2E;
            --light-bg: #F0F4F8;
            --text-main: #333333;
            --text-muted: #666666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            color: var(--text-main);
            background-color: var(--light-bg);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ヘッダー（共通） */
        header {
            background-color: var(--dark-blue);
            color: #ffffff;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            font-weight: 300;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-blue);
        }

        /* お問い合わせコンテナ */
        main {
            flex: 1; /* フッターを最下部に押し下げるため */
        }

        .contact-container {
            max-width: 600px;
            margin: 6rem auto;
            padding: 0 5%;
        }

        .section-title {
            text-align: center;
            color: var(--primary-blue);
            font-size: 1.8rem;
            margin-bottom: 1rem;
            font-weight: 400;
            letter-spacing: 0.1em;
        }

        .contact-desc {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 3rem;
        }

        /* フォームのスタイリング */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--primary-blue);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-bottom: 1px solid #cccccc;
            background-color: transparent;
            font-family: inherit;
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-bottom: 1px solid var(--accent-blue);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
            border: 1px solid #cccccc;
            padding: 1rem;
        }
        
        .form-group textarea:focus {
            border: 1px solid var(--accent-blue);
        }

        .submit-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: background-color 0.3s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background-color: var(--dark-blue);
        }

        /* フッター（共通） */
        footer {
            background-color: var(--dark-blue);
            color: white;
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>PHOTOGRAPHY</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#gallery">Gallery</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-container">
            <h2 class="section-title">Contact</h2>
            <p class="contact-desc">撮影のご依頼や作品についてのお問い合わせは、<br>こちらのフォームよりお願いいたします。</p>
            
            <form class="contact-form" action="mailto:vivi_angerica@yahoo.co.jp" method="POST" enctype="text/plain">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="お名前">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="メールアドレス">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Photography. All Rights Reserved.</p>
    </footer>

</body>
</html>
